name: ML Training CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib

    - name: Run MLflow Project
      working-directory: MLProject
      run: |
        mlflow run . -P n_estimators=100 -P max_depth=10 --env-manager=local

    - name: Upload MLflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: MLProject/mlruns/

    - name: Save model artifacts to repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        mkdir -p artifacts
        cp -r MLProject/mlruns/ artifacts/ 2>/dev/null || true
        git add artifacts/ || true
        git diff --staged --quiet || git commit -m "Auto-update ML artifacts [skip ci]"
        git push || echo "Nothing to push"

  build-docker:
    runs-on: ubuntu-latest
    needs: train-model

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib

    - name: Run MLflow Project for Docker
      working-directory: MLProject
      run: |
        mlflow run . -P n_estimators=100 -P max_depth=10 --env-manager=local

    - name: Find latest model path
      id: find_run
      working-directory: MLProject
      run: |
        MODEL_PATH=$(find mlruns -type d -name "model" -path "*/artifacts/model" | head -1)
        if [ -z "$MODEL_PATH" ]; then
          echo "ERROR: Model not found!"
          find mlruns -type d | head -20
          exit 1
        fi
        echo "model_uri=$MODEL_PATH" >> $GITHUB_OUTPUT
        echo "Found model at: $MODEL_PATH"

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image with MLflow
      working-directory: MLProject
      run: |
        mlflow models build-docker \
          -m "${{ steps.find_run.outputs.model_uri }}" \
          -n "${{ secrets.DOCKER_USERNAME }}/auto-mpg-model" \
          --enable-mlserver

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/auto-mpg-model:latest
